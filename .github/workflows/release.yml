name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Build debug
        run: cargo build --verbose

  build-release:
    name: Build Release
    runs-on: ubuntu-24.04
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build release
        run: cargo build --release --verbose
      
      - name: Rename artifact
        run: |
          cp target/release/libnss_warlock.so libnss_warlock.so.2
          chmod 644 libnss_warlock.so.2
      
      - name: Generate SHA256 checksum
        run: sha256sum libnss_warlock.so.2 > libnss_warlock.so.2.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            libnss_warlock.so.2
            libnss_warlock.so.2.sha256
          body: |
            ## Installation
            
            ```bash
            # Download and install
            sudo curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/libnss_warlock.so.2 \
                 -o /lib/x86_64-linux-gnu/libnss_warlock.so.2
            sudo chmod 644 /lib/x86_64-linux-gnu/libnss_warlock.so.2
            
            # Update nsswitch.conf
            sudo sed -i 's/^passwd:.*/passwd:         files warlock systemd/' /etc/nsswitch.conf
            
            # Test
            getent passwd vm-00000000-0000-4000-8000-000000000000
            ```
            
            ## Verification
            
            ```bash
            # Verify checksum
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/libnss_warlock.so.2.sha256
            sha256sum /lib/x86_64-linux-gnu/libnss_warlock.so.2
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
